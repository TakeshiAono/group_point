AWSTemplateFormatVersion: "2010-09-09"
Description: group-point infrastructure (S3 + EC2 + PostgreSQL)

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  AllowedOrigin:
    Type: String
    Default: "http://localhost:3000"
  AmiId:
    Type: String
    Default: ami-088b486f20fab3f0e
    Description: Amazon Linux 2023 kernel-6.1 AMI (ap-northeast-1, x86_64)

Resources:

  # ─── S3 (アバター) ────────────────────────────────────────────
  AvatarsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "group-point-avatars-${Env}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref AllowedOrigin
            AllowedMethods:
              - GET
              - PUT
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTempUploads
            Status: Enabled
            Prefix: "tmp/"
            ExpirationInDays: 1

  # ─── IAM (S3アクセス + SSM Session Manager用) ───────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "group-point-ec2-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ─── EC2 ──────────────────────────────────────────────────────
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: group-point app server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  AppServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt AppSecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "group-point-${Env}"
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          dnf update -y

          # Node.js 20
          dnf install -y nodejs npm git

          # PostgreSQL 15
          dnf install -y postgresql15-server postgresql15
          postgresql-setup --initdb
          systemctl enable postgresql
          systemctl start postgresql

          # DB・ユーザー作成
          sudo -u postgres psql -c "CREATE USER grouppoint WITH PASSWORD 'changeme';"
          sudo -u postgres psql -c "CREATE DATABASE group_point OWNER grouppoint;"

          # pg_hba.conf を md5 認証に変更
          sed -i 's/^local\s\+all\s\+all\s\+peer/local   all   all   md5/' /var/lib/pgsql/data/pg_hba.conf
          systemctl restart postgresql

          # PM2
          npm install -g pm2
          pm2 startup systemd -u ec2-user --hp /home/ec2-user | tail -1 | bash

          # アプリディレクトリ
          mkdir -p /home/ec2-user/app
          chown ec2-user:ec2-user /home/ec2-user/app

          echo "SETUP COMPLETE" > /home/ec2-user/setup.log

Outputs:
  BucketName:
    Value: !Ref AvatarsBucket
  BucketArn:
    Value: !GetAtt AvatarsBucket.Arn
  EC2PublicDNS:
    Value: !GetAtt AppServer.PublicDnsName
    Description: EC2のパブリックDNS名（アクセスURL）
  EC2PublicIP:
    Value: !GetAtt AppServer.PublicIp
    Description: EC2のパブリックIP
